name: GH Actions

on:
  release:
    types: [published]
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest # Apple Silicon only — GH no longer offers a rolling Intel macOS label
    steps:
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: amd64
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build and test
        run: |
          python -m pip install --upgrade meson ninja
          meson setup build
          ninja -C build
          ninja -C build test

  qt:
    name: Build and test with Qt enabled
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev
      - name: Build and test
        run: |
          python -m pip install --upgrade meson ninja
          meson setup build -Dqt=true
          ninja -C build
          ninja -C build test

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build and test
        run: |
          python -m pip install --upgrade meson ninja
          meson setup build -Db_sanitize=address,undefined
          ninja -C build
          ninja -C build test

  cpp23:
    # The project itself still targets C++20 (cibuildwheel's Windows toolchain has no stable
    # non-preview /std:c++23 yet); this job only exercises the __cpp_lib_byteswap-guarded
    # opt-in path so it doesn't silently bit-rot.
    name: Build and test with -Dcpp_std=c++23 (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build and test
        run: |
          python -m pip install --upgrade meson ninja
          meson setup build -Dcpp_std=c++23
          ninja -C build
          ninja -C build test
